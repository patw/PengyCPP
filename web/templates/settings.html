<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pengy — Settings</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width:600px">
  <div class="d-flex align-items-center mb-4 gap-3">
    <a href="/" class="btn btn-outline-secondary btn-sm">← Back</a>
    <h4 class="mb-0">Settings</h4>
  </div>
  <div class="card shadow-sm">
    <div class="card-body">
      <form method="POST" action="/settings">
        <div class="mb-3">
          <label class="form-label fw-semibold">Base URL</label>
          <input name="base_url" type="url" class="form-control" value="{{BASE_URL}}">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">API Key</label>
          <input name="api_key" type="password" class="form-control"
                 value="{{API_KEY}}" autocomplete="new-password"
                 placeholder="Leave blank to keep existing key">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Model</label>
          <input name="model" type="text" class="form-control" value="{{MODEL}}">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">System Message</label>
          <textarea name="system_message" class="form-control" rows="4">{{SYSTEM_MESSAGE}}</textarea>
          <div class="form-text">
            Available variables: <code>{date}</code> <code>{username}</code>
            <code>{hostname}</code> <code>{osinfo}</code>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Tool Confirmation</label>
          <select name="tool_confirmation" class="form-select">
            <option value="none" {{TC_NONE}}>none — auto-approve all tools</option>
            <option value="safe" {{TC_SAFE}}>safe — confirm destructive tools only</option>
            <option value="all"  {{TC_ALL}}>all — confirm every tool call</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Tool Timeout (seconds)</label>
          <input name="tool_timeout" type="number" class="form-control"
                 value="{{TOOL_TIMEOUT}}" min="5" max="600">
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Context Keep Turns</label>
          <input name="context_keep_turns" type="number" class="form-control"
                 value="{{CONTEXT_KEEP_TURNS}}" min="0">
          <div class="form-text">Number of recent turns to keep full context for. 0 = keep all.</div>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Save Settings</button>
          <a href="/" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
