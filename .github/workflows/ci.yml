name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and Verify
        run: |
          set -ex
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential cmake qt6-base-dev libgl-dev

          echo "=== Versions ==="
          g++ --version | head -1
          cmake --version | head -1

          echo "=== CMake Configure ==="
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cd ..

          echo "=== CMake Build ==="
          cd build
          make -j$(nproc)
          cd ..

          echo "=== Verify ==="
          ls -lh build/pengy build/pengy_cli build/pengy_web
          file build/pengy
