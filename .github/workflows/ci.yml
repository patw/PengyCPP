name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential cmake qt6-base-dev libgl-dev
          echo "=== Tool versions ==="
          g++ --version | head -1
          cmake --version | head -1
          qmake6 --version 2>/dev/null || echo "no qmake6"

      - name: Configure
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release 2>&1

      - name: Build
        run: |
          cd build && make -j2 2>&1

      - name: Verify
        run: |
          ls build/pengy build/pengy_cli build/pengy_web 2>&1
