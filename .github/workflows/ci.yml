name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential cmake qt6-base-dev libgl-dev

      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Verify
        run: |
          test -f build/pengy && echo "pengy ✅"
          test -f build/pengy_cli && echo "pengy_cli ✅"
          test -f build/pengy_web && echo "pengy_web ✅"
