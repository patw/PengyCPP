# Build PengyCPP releases on version tags
#
# Produces and attaches to GitHub Release:
#   Linux:   .deb + AppImage
#   macOS:   .dmg
#   Windows: Pengy-Windows.zip (Qt DLLs bundled)
#
# Usage:
#   git tag v1.3.0 && git push --tags
#
name: Release

on:
  push:
    tags:
      - 'v*'

env:
  VERSION: ${{ github.ref_name }}   # e.g. v1.3.0

permissions:
  contents: write

jobs:
  linux:
    name: Linux (.deb + AppImage)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake qt6-base-dev libgl-dev dpkg-dev \
            libfuse2 fuse3 imagemagick

      - name: Build .deb package
        run: |
          # build_deb.sh always builds from source + creates .deb
          ./build_deb.sh

      - name: Build AppImage
        run: |
          # Ensure build directory exists (build_deb.sh already did this)
          # but AppImage build script needs its own flow
          mkdir -p appimage/tools
          wget -q -P appimage/tools \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q -P appimage/tools \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x appimage/tools/*.AppImage
          cd appimage && ./build.sh

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pengy_*.deb
            Pengy-x86_64.AppImage
          fail_on_unmatched_files: false

  macos:
    name: macOS (DMG)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          export HOMEBREW_NO_REQUIRE_TAP_TRUST=1
          brew install qt@6 cmake

      - name: Build DMG
        run: ./build_macos.sh

      - name: Upload DMG
        uses: softprops/action-gh-release@v2
        with:
          files: Pengy-macOS-*.dmg
          fail_on_unmatched_files: false

  windows:
    name: Windows (Zip)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtnetworkauth'  # lightweight, catches potential missing deps

      - name: Build
        shell: cmd
        run: |
          @echo on
          REM Set up MSVC environment (try Enterprise then Community)
          if exist "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          ) else if exist "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat"
          ) else (
            echo ERROR: Could not find vcvars64.bat
            exit /b 1
          )
          where cl.exe
          REM install-qt-action installs to workspace/../Qt/<version>/<arch>
          set QT6_DIR=%GITHUB_WORKSPACE%\..\Qt\6.8.2\msvc2022_64
          if not exist "%QT6_DIR%\bin\qmake.exe" (
            echo ERROR: Qt6 not found at %QT6_DIR%
            exit /b 1
          )
          echo Using Qt6: %QT6_DIR%
          cmake -B build_windows -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="%QT6_DIR%"
          cmake --build build_windows
          mkdir Pengy-Windows
          copy build_windows\pengy.exe Pengy-Windows\
          cd Pengy-Windows
          windeployqt pengy.exe

      - name: Zip artifacts
        shell: powershell
        run: |
          Compress-Archive -Path Pengy-Windows\* -DestinationPath Pengy-Windows-${{ github.ref_name }}.zip

      - name: Upload Windows Zip
        uses: softprops/action-gh-release@v2
        with:
          files: Pengy-Windows-*.zip
          fail_on_unmatched_files: false
